<!DOCTYPE html>
<html>

<head>
<title>WareTrack Dashboard</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
display:flex;
}

/* Sidebar */

.sidebar{
width:220px;
background:#2c3e50;
height:100vh;
color:white;
padding-top:20px;
}

.sidebar h2{
text-align:center;
margin-bottom:30px;
}

.sidebar a{
display:block;
padding:12px 20px;
color:white;
text-decoration:none;
font-size:15px;
}

.sidebar a:hover{
background:#34495e;
}

/* Main content */

.main{
flex:1;
padding:30px;
}

.header{
font-size:24px;
margin-bottom:25px;
}

/* Dashboard cards */

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

.card h3{
margin:0;
font-size:16px;
color:#777;
}

.card p{
font-size:24px;
margin-top:10px;
font-weight:bold;
}

</style>

</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

<h2>WareTrack</h2>

<a href="dashboard.html">Dashboard</a>
<a href="products.html">Products</a>
<a href="receipts.html">Receipts</a>
<a href="deliveries.html">Deliveries</a>
<a href="transfers.html">Transfers</a>
<a href="adjustments.html">Adjustments</a>
<a href="ledger.html">Stock Ledger</a>

</div>

<!-- Main content -->

<div class="main">

<div class="header">
Dashboard
</div>

<div class="cards">

<div class="card">
<h3>Total Products</h3>
<p id="totalProducts">0</p>
</div>

<div class="card">
<h3>Total Stock</h3>
<p id="totalStock">0</p>
</div>

<div class="card">
<h3>Low Stock Items</h3>
<p id="lowStock">0</p>
</div>

</div>

</div>

<script>

fetch("/products")
.then(res=>res.json())
.then(data=>{

document.getElementById("totalProducts").innerText = data.length

let totalStock = 0
let lowStock = 0

data.forEach(p=>{
totalStock += p.stock
if(p.stock < 10){
lowStock++
}
})

document.getElementById("totalStock").innerText = totalStock
document.getElementById("lowStock").innerText = lowStock

})

</script>

</body>
</html>
