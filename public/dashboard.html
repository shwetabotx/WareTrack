<h1>Dashboard</h1>

<div>Total Products: <span id="tp"></span></div>
<div>Low Stock: <span id="ls"></span></div>
<div>Receipts: <span id="rc"></span></div>
<div>Deliveries: <span id="dl"></span></div>

<script>

async function loadDashboard(){

const res=await fetch("/dashboard")

const data=await res.json()

document.getElementById("tp").textContent=data.totalProducts
document.getElementById("ls").textContent=data.lowStock
document.getElementById("rc").textContent=data.receipts
document.getElementById("dl").textContent=data.deliveries

}

loadDashboard()

</script>
