<!DOCTYPE html>
<html>

<head>
<title>Delivery Orders</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
display:flex;
}

/* Sidebar */

.sidebar{
width:220px;
background:#2c3e50;
color:white;
height:100vh;
padding-top:20px;
}

.sidebar h2{
text-align:center;
margin-bottom:30px;
}

.sidebar a{
display:block;
padding:12px 20px;
color:white;
text-decoration:none;
}

.sidebar a:hover{
background:#34495e;
}

/* Main */

.main{
flex:1;
padding:30px;
}

/* Card */

.card{
background:white;
padding:25px;
border-radius:8px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
width:400px;
}

/* Form */

input, select{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background:#e74c3c;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#c0392b;
}



</style>

</head>

<body>

<!-- Sidebar -->

<div class="sidebar">

<h2>WareTrack</h2>

<a href="dashboard.html">Dashboard</a>
<a href="products.html">Products</a>
<a href="receipts.html">Receipts</a>
<a href="deliveries.html">Deliveries</a>
<a href="transfers.html">Transfers</a>
<a href="adjustments.html">Adjustments</a>

</div>


<!-- Main Content -->

<div class="main">

<h1>Create Delivery Order</h1>

<div class="card">

<form action="/deliveries/create" method="POST">

<label>Product</label>
<input name="product" placeholder="Product Name" required>

<label>Quantity</label>
<input name="qty" type="number" placeholder="Quantity to Deliver" required>

<label>Status</label>
<select name="status">
<option value="pick">Pick Items</option>
<option value="pack">Pack Items</option>
<option value="validate">Validate & Ship</option>
</select>

<button>Create Delivery</button>

</form>

</div>


</body>

</html>
