<!DOCTYPE html>
<html>
<head>
<title>WareTrack Authentication</title>

<style>

body{
font-family: Arial;
background:#f2f2f2;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:30px;
width:320px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h2{
text-align:center;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background:#4CAF50;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#45a049;
}

.link{
text-align:center;
margin-top:10px;
cursor:pointer;
color:blue;
}

.hidden{
display:none;
}

</style>

<script>

function showSignup(){
document.getElementById("login").classList.add("hidden");
document.getElementById("signup").classList.remove("hidden");
document.getElementById("forgot").classList.add("hidden");
}

function showLogin(){
document.getElementById("signup").classList.add("hidden");
document.getElementById("login").classList.remove("hidden");
document.getElementById("forgot").classList.add("hidden");
}

function showForgot(){
document.getElementById("login").classList.add("hidden");
document.getElementById("signup").classList.add("hidden");
document.getElementById("forgot").classList.remove("hidden");
}

</script>

</head>

<body>

<div class="container">

<!-- LOGIN -->

<div id="login">

<h2>Login</h2>

<form action="/login" method="POST">

<input type="email" name="email" placeholder="Email" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<div class="link" onclick="showSignup()">Create account</div>
<div class="link" onclick="showForgot()">Forgot password</div>

</div>

<!-- SIGNUP -->

<div id="signup" class="hidden">

<h2>Signup</h2>

<form action="/signup" method="POST">

<input type="email" name="email" placeholder="Email" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Signup</button>

</form>

<div class="link" onclick="showLogin()">Back to Login</div>

</div>

<!-- FORGOT PASSWORD -->

<div id="forgot" class="hidden">

<h2>Forgot Password</h2>

<form action="/send-otp" method="POST">

<input type="email" name="email" placeholder="Enter Email" required>

<button type="submit">Send OTP</button>

</form>

<div class="link" onclick="showLogin()">Back to Login</div>

</div>

</div>

</body>
</html>
