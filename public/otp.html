<!DOCTYPE html>
<html>
<head>
<title>Verify OTP</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#4CAF50,#2e7d32);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{
background:white;
padding:35px;
width:320px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
text-align:center;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:6px;
}

button{
width:100%;
padding:12px;
background:#4CAF50;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#388e3c;
}

</style>

</head>

<body>

<div class="card">

<h2>Verify OTP</h2>

<form action="/verify-otp" method="POST">

<input type="email" name="email" placeholder="Email" required>

<input type="text" name="otp" placeholder="Enter OTP" required>

<button type="submit">Verify OTP</button>

</form>

</div>

</body>
</html>
